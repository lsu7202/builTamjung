<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>고도화 로드뷰</title>
    <script type="text/javascript" src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId={{ client_id }}&submodules=panorama"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        #pano { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="pano"></div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const position = new naver.maps.LatLng(parseFloat(params.get('lat')), parseFloat(params.get('lng')));
        const syncChannel = new BroadcastChannel('pano_sync');

        const pano = new naver.maps.Panorama("pano", {
            position: position,
            aroundControl: true, // ★ 과거 거리뷰 및 주변 뷰 선택 기능 활성화
            aroundControlOptions: { position: naver.maps.Position.TOP_LEFT }
        });

        // 1. 시야 변화 감지 -> 메인 지도로 전송
        naver.maps.Event.addListener(pano, "pov_changed", () => {
            syncChannel.postMessage({ type: 'pov', pan: pano.getPov().pan });
        });

        // 2. 위치 변화 감지 -> 메인 지도로 전송
        naver.maps.Event.addListener(pano, "position_changed", () => {
            const pos = pano.getPosition();
            syncChannel.postMessage({ type: 'pos', lat: pos.lat(), lng: pos.lng() });
        });


        // 3. 클릭한 좌표로 즉시 이동 (최신 업데이트 버전)
        naver.maps.Event.addListener(pano, "click", (e) => {
            console.log(e.coord)
            if (e.coord) pano.setPosition(e.coord);
        });

        // 초기 위치 전송
        naver.maps.Event.addListener(pano, "init", () => {
            const pos = pano.getPosition();
            syncChannel.postMessage({ type: 'pos', lat: pos.lat(), lng: pos.lng() });
        });
    </script>
</body>
</html>
