<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>빌탐정 - 시작하기</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-box { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); width: 350px; }
        .tabs { display: flex; margin-bottom: 1.5rem; border-bottom: 2px solid #eee; }
        .tab { flex: 1; padding: 0.75rem; text-align: center; cursor: pointer; color: #64748b; }
        .tab.active { color: var(--primary); border-bottom: 2px solid var(--primary); font-weight: bold; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; font-size: 0.875rem; margin-bottom: 0.4rem; color: #475569; }
        input, select { width: 100%; padding: 0.6rem; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 0.75rem; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 1rem; }
        button:hover { background: #1d4ed8; }
        .hidden { display: none; }
        #team-input-group { background: #f1f5f9; padding: 10px; border-radius: 6px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="auth-box">
    <div class="tabs">
        <div class="tab active" onclick="switchTab('login')">로그인</div>
        <div class="tab" onclick="switchTab('signup')">회원가입</div>
    </div>

    <div id="login-form">
        <div class="form-group">
            <label>아이디</label>
            <input type="text" id="login_id">
        </div>
        <div class="form-group">
            <label>비밀번호</label>
            <input type="password" id="login_pw">
        </div>
        <button onclick="handleLogin()">로그인</button>
    </div>

    <div id="signup-form" class="hidden">
        <div class="form-group">
            <label>아이디</label>
            <input type="text" id="join_id">
        </div>
        <div class="form-group">
            <label>비밀번호</label>
            <input type="password" id="join_pw">
        </div>
        <div class="form-group">
            <label>이름</label>
            <input type="text" id="join_name">
        </div>
        <div class="form-group">
            <label>역할</label>
            <select id="join_role" onchange="toggleTeamInput()">
                <option value="MASTER">팀장</option>
                <option value="SLAVE">직원</option>
            </select>
        </div>
        <div id="team-input-group" class="hidden">
            <label>팀장 아이디</label>
            <input type="text" id="join_team_id">
        </div>
        <button onclick="handleSignup()">회원가입</button>
    </div>
</div>

<script src="{{ url_for('static', filename='auth.js') }}"></script>
<script>
    
    function switchTab(type) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        if (type === 'login') {
            document.getElementById('login-form').classList.remove('hidden');
            document.getElementById('signup-form').classList.add('hidden');
            document.querySelectorAll('.tab')[0].classList.add('active');
        } else {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('signup-form').classList.remove('hidden');
            document.querySelectorAll('.tab')[1].classList.add('active');
        }
    }

    function toggleTeamInput() {
        const role = document.getElementById('join_role').value;
        const group = document.getElementById('team-input-group');
        group.classList.toggle('hidden', role === 'MASTER');
    }

</script>
</body>
</html>
