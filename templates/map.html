<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>부동산 지도 검색</title>
    <script type="text/javascript" src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId={{ client_id }}&submodules=geocoder,panorama,drawing"></script>
    <script type="text/javascript" src="https://navermaps.github.io/maps.js.ncp/docs/js/MarkerClustering.js"></script>></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        /* 줌 안내 문구 스타일 */
        #zoom-notice {
            position: absolute; top: 80px; left: 50%; transform: translateX(-50%);
            z-index: 20; background: rgba(0,0,0,0.7); color: white;
            padding: 8px 16px; border-radius: 20px; font-size: 13px;
            pointer-events: none; display: none;
        }

        /* 미니 파노라마 스타일 */
        #pano-wrapper {
            position: absolute; bottom: 20px; right: 20px;
            width: 320px; height: 210px;
            z-index: 50; background: white;
            border-radius: 12px; border: 2px solid white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
             display: none; /* 초기 숨김 */
            transition: all 0.3s ease;
        }
        /* 확대 모드 */
        #pano-wrapper.expanded { width: 100%; height: 100%; bottom: 50%; right: 50%; transform: translate(50%, 50%); }
        #pano-view { width: 100%; height: 100%; }

        .pano-controls { position: absolute; top: 10px; right: 10px; display: flex; gap: 5px; z-index: 60; }
        .pano-btn { width: 30px; height: 30px; background: rgba(0,0,0,0.6); color: white; border-radius: 6px; 
                   display: flex; align-items: center; justify-content: center; cursor: pointer; }
    </style>
</head>
<body class="relative w-full h-full">

    <div id="map" class="absolute inset-0 w-full h-full z-0"></div>

    <div class="absolute top-4 left-4 z-10 w-80">
        <div class="bg-white rounded-lg shadow-lg p-3 border border-gray-200">
            <div class="flex gap-2">
                <input type="text" id="searchInput"
                       class="flex-1 border rounded px-3 py-2 text-sm focus:outline-blue-500" 
                       onkeypress="if(event.key==='Enter') searchAddress()">
                <button onclick="searchAddress()" class="bg-blue-600 text-white px-3 rounded hover:bg-blue-700">
                    <i class="fa-solid fa-search"></i>
                </button>
            </div>
        </div>
    </div>

    <div class="absolute top-1/2 -translate-y-1/2 right-4 z-10 flex flex-col gap-3">
        <button onclick="triggerPanoAtMarker()" 
                class="bg-white p-3 rounded-full shadow-lg border border-gray-200 hover:bg-blue-50 text-blue-600 transition-all group">
            <i class="fa-solid fa-street-view text-2xl"></i>
            <span class="absolute right-14 bg-gray-800 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 whitespace-nowrap transition-opacity">거리뷰</span>
        </button>

        <button id="ruler-btn" onclick="toggleRuler()" class="bg-white p-3 rounded-full shadow-lg border border-gray-200 hover:bg-red-50 text-gray-700 transition-all group">
        <i class="fa-solid fa-ruler-combined text-xl"></i>
        <span class="absolute right-14 bg-gray-800 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 whitespace-nowrap transition-opacity">거리 측정</span>
    </button>
    </div>

    <div id="pano-wrapper">
        <div class="pano-controls">
            <div onclick="togglePanoSize()" class="pano-btn"><i id="expand-icon" class="fa-solid fa-expand"></i></div>
            <div onclick="closePano()" class="pano-btn"><i class="fa-solid fa-xmark"></i></div>
        </div>
        <div id="pano-view"></div>
    </div>

    <!-- <div id="zoom-notice" style="position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 20; 
         background: #3b82f6; color: white; padding: 10px 20px; border-radius: 30px; font-weight: bold; display: none;">
        지도를 더 확대하면 매물이 나타납니다.
    </div> -->

    <script src="{{ url_for('static', filename='script.js') }}"></script>
    
</body>
</html>
