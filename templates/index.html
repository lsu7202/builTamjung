    <style>
        /* 기본 설정 */
        body { font-family: 'Malgun Gothic', 'Dotum', sans-serif; font-size: 12px; color: #333; background-color: #f3f4f6; }
        
        /* Handsontable 높이 자동 조절 - 검색창이 줄어들었으므로 높이 계산 수정 */
        #spreadsheet-container { width: 100%; height: calc(100vh - 220px); overflow: hidden; background: #fff; }
        
        /* 스크롤바 커스텀 */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 3px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 아코디언 스타일 */
        details > summary { list-style: none; cursor: pointer; user-select: none; }
        details > summary::-webkit-details-marker { display: none; }
        details[open] > summary i.arrow-icon { transform: rotate(180deg); }
        details > summary i.arrow-icon { transition: transform 0.2s; }

        /* 마킹 버튼 */
        .star-btn { display: none; position: absolute; right: 4px; top: 50%; transform: translateY(-50%); cursor: pointer; z-index: 10; }
        .handsontable td:hover .star-btn { display: block; }
        .star-btn.active { display: block; color: #f59e0b; }

        /* 드롭다운 */
        .dropdown-list {
            position: absolute; top: 100%; left: 0; min-width: 120px;
            max-height: 150px; overflow-y: auto; background: white; border: 1px solid #ccc;
            z-index: 50; display: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .dropdown-item { padding: 6px 10px; cursor: pointer; }
        .dropdown-item:hover { background-color: #f3f4f6; }

        /* 태그 애니메이션 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .tag-item { animation: fadeIn 0.2s ease-out; }

        /* --- [New Style] 검색스타일_1번 CSS 통합 --- */
        .input-wrapper {
            display: flex;
            align-items: center;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            background-color: #fff;
            overflow: hidden;
            transition: all 0.2s;
            height: 30px; /* 기존 UI에 맞춰 높이 약간 조정 */
        }

        .input-wrapper:focus-within {
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1);
        }

        /* 공통 인풋 스타일 */
        .clean-input {
            border: none;
            outline: none;
            padding: 0 8px;
            font-size: 12px;
            color: #374151;
            width: 100%;
            height: 100%;
            text-align: right; /* 숫자/날짜 우측 정렬 */
            background: transparent;
        }
        
        /* 날짜 입력 필드 전용 */
        .date-input {
            font-family: monospace;
            letter-spacing: 0.5px;
            text-align: center;
        }

        .arrow-btn {
            width: 30px;
            height: 100%;
            border: none;
            border-left: 1px solid #e5e7eb;
            background-color: #f9fafb;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #9ca3af;
            transition: background 0.2s;
            font-size: 11px;
        }

        .arrow-btn:hover {
            background-color: #f3f4f6;
            color: #4b5563;
        }

        .arrow-btn.up i { color: #ef4444; }   /* Up: Red (이상/이후) */
        .arrow-btn.down i { color: #3b82f6; } /* Down: Blue (이하/이전) */

        .label {
            font-size: 12px;
            font-weight: 700;
            color: #4b5563;
            margin-right: 6px;
            white-space: nowrap;
        }
        
        /* 섹션 헤더 스타일 */
        .section-mini-header {
            font-size: 11px;
            font-weight: bold;
            color: #6b7280;
            margin-right: 8px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
    </style>

                    els.selDong.disabled = false;
                    els.selDong.classList.replace('bg-gray-50', 'bg-white');
                    
                    // 전체 옵션
                    const allOpt = document.createElement('option');
                    allOpt.value = "전체";
                    allOpt.innerText = `${si} 전체`;
                    allOpt.className = "font-bold text-blue-600";
                    els.selDong.appendChild(allOpt);

                    // 동 옵션
                    DIVISIONS[si].forEach(dong => {
                        const opt = document.createElement('option');
                        opt.value = dong;
                        opt.innerText = dong;
                        els.selDong.appendChild(opt);
                    });
                } else {
                    els.selDong.disabled = true;
                    els.selDong.classList.replace('bg-white', 'bg-gray-50');
                }
            });

            // 읍면동 선택 (자동 추가)
            els.selDong.addEventListener('change', () => {
                const si = els.selSigungu.value;
                const dong = els.selDong.value;
                if (!si || !dong) return;

                const val = (dong === "전체") ? `${si} 전체` : `${si} ${dong}`;
                if (selectedRegionSet.has(val)) {

                } else {
                    addTag(selectedRegionSet, els.regionTagContainer, val);
                }
                els.selDong.value = ""; // 초기화

        // =========================================================
        // 2. 상세 조건 로직 (스타일 최적화 적용)
        // =========================================================
        function initDetailSelectors() {
            els.detailSelectGrid.innerHTML = '';
            
            Object.entries(PREDEFINED_DATA).forEach(([key, values]) => {
                // Wrapper - 공간 절약을 위해 block이 아닌 컴팩트한 flex 아이템으로 변경
                const wrapper = document.createElement('div');
                wrapper.className = "flex items-center"; // Layout change
                
                // Select - w-full 제거, 글자 크기 축소, 패딩 축소
                const select = document.createElement('select');
                select.className = "border border-gray-300 rounded px-1 py-1 text-xs focus:outline-none focus:border-blue-500 bg-white cursor-pointer hover:bg-gray-50";
                // 플레이스홀더처럼 보이게 처리
                select.innerHTML = `<option value="" disabled selected>${key}</option>`;
                
                values.forEach(v => {
                    const opt = document.createElement('option');
                    opt.value = v;
                    opt.innerText = v;
                    select.appendChild(opt);
                });

                // Event Listener (로직 유지)
                select.addEventListener('change', () => {
                    const val = select.value;
                    if (!val) return;
                    
                    const tagKey = `${key}:${val}`; // 구분용 Key
                    const display = `${key} - ${val}`;

                    if (selectedDetailSet.has(tagKey)) {
                        alert("이미 선택된 조건입니다.");
                    } else {
                        addTag(selectedDetailSet, els.detailTagContainer, display, tagKey);
                    }
                    select.value = ""; // 초기화
                });

                wrapper.appendChild(select);
                els.detailSelectGrid.appendChild(wrapper);
            });
        }

        // =========================================================
        // 3. 공통 태그 관리 함수
        // =========================================================
        function addTag(setObj, container, displayText, actualKey = null) {
            const key = actualKey || displayText;
            
            // UI 초기화 (placeholder 제거)
            if (setObj.size === 0) container.innerHTML = '';

            setObj.add(key);

            const tag = document.createElement('span');
            // 태그 스타일도 조금 더 작게 수정
            tag.className = "tag-item bg-blue-50 border border-blue-200 text-blue-700 px-1.5 py-0.5 rounded text-[11px] font-bold flex items-center gap-1 shadow-sm";
            tag.innerHTML = `
                ${displayText}
                <i class="fa-solid fa-xmark cursor-pointer text-blue-400 hover:text-red-500 transition text-[10px]"></i>
            `;
            
            // 삭제 이벤트
            tag.querySelector('i').onclick = () => {
                setObj.delete(key);
                tag.remove();
                if (setObj.size === 0) {
                    container.innerHTML = `<span class="text-xs text-gray-300 py-0.5">미선택</span>`;
                }
            };

            container.appendChild(tag);
        }

        // =========================================================
        // 4. 검색 & 필터 수집 로직 (기존 유지)
        // =========================================================
        els.searchBtn.addEventListener('click', () => { currentFilters = collectFilters(); currentPage = 1; fetchData(1); });
        els.resetBtn.addEventListener('click', () => {
            // 1. 선택된 태그 및 세트 초기화
            selectedRegionSet.clear(); 
            selectedDetailSet.clear();
            els.regionTagContainer.innerHTML = '<span class="text-xs text-gray-300 py-0.5">지역 미선택</span>';
            els.detailTagContainer.innerHTML = '<span class="text-xs text-gray-300 py-0.5">상세조건 미선택</span>';
            
            // 2. 지역 선택 셀렉트 박스 초기화
            els.selSigungu.value = ""; 
            els.selDong.innerHTML = '<option value="">선택</option>';
            els.selDong.disabled = true; 
            els.selDong.classList.replace('bg-white', 'bg-gray-50');
            
            // 3. 상세조건 셀렉트 박스 초기화
            document.querySelectorAll('#detailSelectGrid select').forEach(s => s.value = "");
            
            // 4. [수정됨] 입력 필드 초기화 
            // .toggle-input (새로 추가된 엘리베이터, 날짜 등) 클래스 추가
            document.querySelectorAll('.range-input, .toggle-input, #BUNJISearchInput, #mainSearchInput').forEach(inp => inp.value = '');

            // 5. [추가됨] 화살표 버튼 상태 초기화 (모두 UP/빨강 상태로 복귀)
            document.querySelectorAll('.arrow-btn').forEach(btn => {
                const icon = btn.querySelector('i');
                
                // 버튼 클래스 초기화
                btn.classList.remove('down');
                btn.classList.add('up');
                
                // 아이콘 클래스 초기화
                if (icon) {
                    icon.classList.remove('fa-arrow-down');
                    icon.classList.add('fa-arrow-up');
                }
            });
        });

        // 화살표 토글 함수 (▲ <-> ▼)
        function toggleArrow(btn) {
            const icon = btn.querySelector('i');
            
            if (icon.classList.contains('fa-arrow-up')) {
                // Up -> Down (이하/이전)
                icon.classList.remove('fa-arrow-up');
                icon.classList.add('fa-arrow-down');
                btn.classList.remove('up');
                btn.classList.add('down');
            } else {
                // Down -> Up (이상/이후)
                icon.classList.remove('fa-arrow-down');
                icon.classList.add('fa-arrow-up');
                btn.classList.remove('down');
                btn.classList.add('up');
            }
        }

        // 날짜 자동 포맷팅 (YYYY-MM-DD)
        function formatDate(input) {
            let value = input.value.replace(/[^0-9]/g, '');
            if (value.length > 4 && value.length <= 6) {
                value = value.slice(0, 4) + '-' + value.slice(4);
            } else if (value.length > 6) {
                value = value.slice(0, 4) + '-' + value.slice(4, 6) + '-' + value.slice(6);
            }
            if (value.length > 10) value = value.slice(0, 10);
            input.value = value;
        }

        // 숫자만 입력
        function onlyNumbers(input) {
            input.value = input.value.replace(/[^0-9]/g, '');
        }

        function collectFilters() {
            const sigunguList = []; const dongList = [];
            selectedRegionSet.forEach(val => {
                const parts = val.split(" ");
                const si = parts[0]; const dong = parts[1];
                if (!sigunguList.includes(si)) sigunguList.push(si);
                if (dong !== "전체" && !dongList.includes(dong)) dongList.push(dong);
            });

            const multiFilters = {};
            selectedDetailSet.forEach(val => {
                const [displayKey, value] = val.split(":");
                const dbKey = COLUMN_MAP[displayKey] || displayKey; 
                if (!multiFilters[dbKey]) multiFilters[dbKey] = [];
                multiFilters[dbKey].push(value);
            });

            const keyword = els.searchInput.value;
            const bunji = els.bunjiInput.value;
            
            const ranges = {};
            const dateRange = { start: '', end: '' };

            

            // 1. 기존 Range Input 처리 (Min ~ Max)
            document.querySelectorAll('.range-input').forEach(input => {
                const col = input.dataset.col; 
                if (input.value) {
                    if (!ranges[col]) ranges[col] = {};
                    const isMin = input.nextElementSibling && input.nextElementSibling.tagName === 'SPAN';
                    ranges[col][isMin ? 'min' : 'max'] = input.value;
                }
            });

            // 2. [New] Toggle Input 처리 (화살표 방향에 따라 Min/Max 결정)
            document.querySelectorAll('.toggle-input').forEach(input => {
                const val = input.value;
                if (!val) return;

                const col = input.dataset.col; // 예: 엘리베이터, 사용승인일
                const btn = input.nextElementSibling;
                // Up(Red) = 이상(>=, min), Down(Blue) = 이하(<=, max)
                const isUp = btn.classList.contains('up'); 
                const rangeKey = isUp ? 'min' : 'max';

                // 날짜 컬럼 특수 처리 (app.py 구조에 맞춤)
                if (col === '사용승인일') {
                    if (isUp) dateRange.start = val;
                    else dateRange.end = val;
                } else {
                    // 일반 숫자 (엘리베이터, 주차장 등) 및 기타 날짜
                    if (!ranges[col]) ranges[col] = {};
                    ranges[col][rangeKey] = val;
                }
            });

            return { keyword, bunji, sigungu: sigunguList, bjd: dongList, multi_filters: multiFilters, ranges, date_range: dateRange };
        }

        // =========================================================
        // 5. 서버 통신 및 테이블 렌더링 (★수정됨★)
        // =========================================================
        async function fetchData(page) {
            els.spinner.classList.remove('hidden');
            try {
                const res = await fetch('/api/get_data', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ ...currentFilters, page, limit: ITEMS_PER_PAGE })
                });
                const responseData = await res.json();
                const data = responseData.data || [];
                totalRows = responseData.total || 0;
                currentPage = responseData.page || 1;

                renderTable(data);
                document.getElementById('btnSaveData').disabled = (data.length === 0);
                updatePaginationUI();
            } catch (e) { console.error(e); } finally { els.spinner.classList.add('hidden'); }
        }

        function renderTable(data) {

            const container = document.getElementById('spreadsheet-container');
            if (hot) hot.destroy();
            
            // 저장된 순서가 있으면 그걸 쓰고, 없으면 기본 순서(TARGET_COLUMNS = Display Names)
            const displayHeaderOrder = savedColumnOrder.length > 0 ? savedColumnOrder : TARGET_COLUMNS;
            
            // ★ [핵심] config 생성 시 data 속성을 DB컬럼명으로 매핑
            const columnsConfig = displayHeaderOrder.map(headerName => getColumnConfig(headerName));

            hot = new Handsontable(container, {
                data: data, // 데이터는 DB컬럼명을 키로 가짐
                colHeaders: displayHeaderOrder, // 헤더는 노출값(Display Name)
                columns: columnsConfig, // 매핑 정보
                rowHeaders: true, height: '100%', width: '100%',
                licenseKey: 'non-commercial-and-evaluation',
                manualColumnMove: true, manualColumnResize: true, filters: true,
                dropdownMenu: true, contextMenu: true,
                afterColumnMove: (m, f, d, p, changed) => { if(changed) saveColumnOrder(); }
            });
        }

        function getColumnConfig(displayHeader) {
            // ★ 노출값(displayHeader) -> DB컬럼명(dbKey) 변환
            const dbKey = COLUMN_MAP[displayHeader] || displayHeader;

            const config = { 
                data: dbKey, // 데이터 바인딩은 DB 컬럼명으로
                // renderer: Handsontable.renderers.TextRenderer 
            };

            // 읽기 전용 컬럼 설정 (ctid, 주소, 승인일 등)
            if (dbKey === 'ctid' || displayHeader === '주소' || displayHeader.includes('승인일')) config.readOnly = true;
            
            // 렌더러 설정
            const dateCols = ['사용승인일', '대수선 및 리모델링'];
            if (displayHeader === '주소') config.renderer = addressRenderer;
            if (dateCols.includes(displayHeader)) config.renderer = dateRenderer;
            

            // 포맷팅 그룹 정의 (노출값 기준 or DB값 기준 상관없으나 노출값 기준으로 분류)
            const moneyCols = ['공시지가(현재)', '공시지가(5년전)', '공시지가(10년전)', '공시지가 기준', '매매가(억)'];
            const decimalCols = ['대지면적', '연면적', '건축면적', '용적률산정용연면적']; 
            const percentCols = displayHeader.includes('비율') || displayHeader.includes('상승률') || displayHeader.includes('건폐율') || (displayHeader.includes('용적률') && (!displayHeader.includes('용적률산정용연면적')));

            if (moneyCols.includes(displayHeader)) {
                
                config.type = 'numeric'; config.numericFormat = { pattern: '0,0' };
            } else if (decimalCols.includes(displayHeader)) {
                
                config.renderer = function(instance, td, row, col, prop, value, cellProperties) {
            // 기본 텍스트 렌더러 적용
            Handsontable.renderers.TextRenderer.apply(this, arguments);
            
            if (value !== null && value !== undefined && value !== "") {
                const numValue = parseFloat(value);
                if (!isNaN(numValue)) {
                    if (isPyungMode) {
                        // 평으로 변환 (소수점 2자리)
                        const pyungVal = (numValue * PYUNG_FACTOR).toFixed(2);
                        td.innerText = pyungVal + " 평";
                        
                    } else {
                        // m2 그대로 표시 (천단위 콤마)
                        td.innerText = numValue.toLocaleString() + " ㎡";
                        
                    }
                }
            }
            td.style.textAlign = 'right'; // 우측 정렬
        };
            } else if (percentCols) {
                
                config.type = 'numeric'; config.numericFormat = { pattern: '00.[00]' };
                config.renderer = function(instance, td, row, col, prop, value, cellProperties) {
                    Handsontable.renderers.NumericRenderer.apply(this, arguments);
                    
                    if (value !== null && !isNaN(value)){
                        const numValue = parseFloat(value);

                        if (numValue < 0) td.style.backgroundColor = "#f58f5f";
                        else if (numValue > 0) td.style.backgroundColor = "#61b7f4"
                        else td.style.backgroundColor = '';
                        
                        td.innerText += '%';
                    } 
                    else {
                        td.style.backgroundColor = '';
                        td.style.color = '';
                    }
                };
            }

            // 매매가 강조
            if (displayHeader === '매매가(억)') {
                config.renderer = function(instance, td, row, col, prop, value, cp) {
                    Handsontable.renderers.NumericRenderer.apply(this, arguments);
                    td.style.fontWeight = 'bold';
                };
            }
            return config;
        }

        function addressRenderer(instance, td, row, col, prop, value, cellProperties) {
            Handsontable.renderers.TextRenderer.apply(this, arguments);
            if (!value) return;
            const markInfo = wishlistMap[value];
            if (markInfo) {
                td.style.backgroundColor = markInfo.color;
                td.style.fontWeight = 'bold';
            }
            const iconClass = markInfo ? 'fa-solid fa-star text-yellow-500' : 'fa-regular fa-star text-gray-300';
            const star = document.createElement('i');
            star.className = `${iconClass} star-btn absolute right-2 top-1/2 -translate-y-1/2`;
            star.onclick = (e) => { e.stopPropagation(); toggleMark(value); };
            td.appendChild(star);
        }

        function dateRenderer(instance, td, row, col, prop, value) {
            Handsontable.renderers.TextRenderer.apply(this, arguments);
            // YYYYMMDD -> YYYY-MM-DD
            if (value && String(value).length === 8) {
                const s = String(value);
                td.innerText = `${s.substring(0,4)}-${s.substring(4,6)}-${s.substring(6,8)}`;
            } else if (value) {
                td.innerText = value;
            }
        }

        // --- 기타 기능 (페이지네이션, 마킹 등) ---
        function updatePaginationUI() {
            const maxPage = Math.ceil(totalRows / ITEMS_PER_PAGE) || 1;
            els.pageInfo.innerText = `${currentPage} / ${maxPage}`;
            els.btnPrev.disabled = (currentPage <= 1);
            els.btnNext.disabled = (currentPage >= maxPage);
            els.paginationContainer.classList.remove('hidden');
        }
        function setupPaginationEvents() {
            els.btnPrev.addEventListener('click', () => { if(currentPage > 1) fetchData(--currentPage); });
            els.btnNext.addEventListener('click', () => { 
                const maxPage = Math.ceil(totalRows / ITEMS_PER_PAGE);
                if(currentPage < maxPage) fetchData(++currentPage); 
            });
        }
        async function loadWishlist() {
            try {
                const res = await fetch('/api/wishlist');
                wishlistMap = await res.json();
                existingGroups.clear();
                Object.values(wishlistMap).forEach(item => { if(item.group_name) existingGroups.add(item.group_name); });
            } catch {}
        }
        
        // 컬럼 설정 불러오기: 저장된 값은 '노출값(Display Name)' 리스트여야 함
        async function loadColumnSettings() {
            try {
                const res = await fetch('/api/settings/columns');
                const data = await res.json();
                if(data && data.length) savedColumnOrder = data;
            } catch {}
        }

        window.toggleMark = async (address) => {
            const isMarked = !!wishlistMap[address];
            const color = els.colorPicker.value;
            const group = els.groupNameInput.value;
            try {
                if (isMarked) {
                    await fetch('/api/wishlist', { method: 'DELETE', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ address }) });
                    delete wishlistMap[address];
                } else {
                    await fetch('/api/wishlist', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ address, color, group_name: group }) });
                    wishlistMap[address] = { color, group_name: group };
                    existingGroups.add(group);
                }
                hot.render();
            } catch { alert("저장 실패"); }
        };

        // 컬럼 순서 저장: 사용자가 보고 있는 '노출값' 순서를 저장
        async function saveColumnOrder() {
            const count = hot.countCols();
            const newOrder = [];
            // Handsontable의 colToProp는 'data' 키(DB컬럼명)를 반환할 수 있으므로, 
            // 화면에 보이는 헤더명(노출값)을 가져오도록 로직 조정 필요.
            // 하지만 Handsontable에서 colHeaders 배열 자체를 재정렬해서 관리하는게 아니라면,
            // 여기서는 colHeaders[visualIndex]를 가져오는게 안전함.
            
            const settings = hot.getSettings();
            const currentHeaders = settings.colHeaders; // 현재 설정된 헤더 배열
            
            for(let i=0; i<count; i++) {
                const visualIndex = hot.toVisualColumn(i); // 물리 인덱스 -> 현재 보이는 인덱스 X
                // afterColumnMove에서는 변경된 인덱스 정보를 이용해야 함.
                // 가장 확실한 방법: hot.colHeaders 가 참조가 아니라 값이면 어렵지만,
                // Handsontable 인스턴스에서 현재 보이는 컬럼의 헤더 텍스트를 가져옴
                const headerText = hot.getColHeader(i); // i번째 보이는 컬럼의 헤더
                newOrder.push(headerText);
            }
            
            try { await fetch('/api/settings/columns', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ columns: newOrder }) }); } catch {}
        }

        document.getElementById('btnSaveData').addEventListener('click', async () => {
            try {
                // hot.getSourceData()는 DB컬럼명을 Key로 가진 객체 배열을 반환함 (config.data가 DB컬럼명이므로)
                // 별도 변환 없이 그대로 전송하면 됨.
                await fetch('/api/update_data', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(hot.getSourceData()) });
                alert("저장되었습니다.");
            } catch { alert("저장 실패"); }
        });

        function setupGroupDropdown() {
            const input = els.groupNameInput;
            const dropdown = els.groupDropdown;

                dropdown.innerHTML = '';
                if(existingGroups.size === 0) dropdown.innerHTML = '<div class="p-2 text-gray-400 text-xs">그룹 없음</div>';
                else existingGroups.forEach(g => {

        // --- [추가] 엔터키 입력 시 검색 실행 함수 ---
        // --- [수정됨] 엔터키 입력 감지 (이벤트 위임 방식) ---
        function setupEnterKeySearch() {
            document.addEventListener('keydown', function(e) {
                // 1. 눌린 키가 엔터(Enter)인지 확인
                if (e.key !== 'Enter') return;

                // 2. 현재 포커스된 요소가 우리가 원하는 입력창들인지 확인
                const target = e.target;
                const isSearchInput = 
                    target.id === 'mainSearchInput' || 
                    target.id === 'BUNJISearchInput' || 
                    target.id === 'selRegionDong' ||
                    target.id === 'detailSelectGrid' ||
                    target.classList.contains('range-input') || 
                    target.classList.contains('toggle-input');

                // 3. 맞다면 검색 버튼 클릭 강제 실행
                if (isSearchInput) {
                    
                    e.preventDefault(); // 줄바꿈 방지
                    const btn = document.getElementById('btnMainSearch');
                    if(btn) btn.click();
                }
            });
        }
    </script>
</body>
</html>
